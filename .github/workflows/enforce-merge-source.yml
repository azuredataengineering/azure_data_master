name: Enforce Merge Source

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR source is develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "Pull requests into main are only allowed from the develop branch."
            echo "This PR is from '${{ github.head_ref }}'."
            exit 1
          fi
          echo "Source branch is develop. OK to proceed."
